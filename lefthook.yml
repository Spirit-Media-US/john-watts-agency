pre-push:
  commands:
    block-main-push:
      run: |
        BRANCH=$(git rev-parse --abbrev-ref HEAD)
        if [ "$BRANCH" = "main" ]; then
          echo "❌ BLOCKED: Direct pushes to main are not allowed."
          echo "   Team: open a PR from dev → main for Kevin to approve."
          exit 1
        fi
      skip:
        - merge
        - rebase
    large-files:
      run: |
        MAX=5242880
        for file in $(git diff --cached --name-only); do
          [ -f "$file" ] || continue
          SIZE=$(stat -c%s "$file" 2>/dev/null || stat -f%z "$file" 2>/dev/null)
          if [ "$SIZE" -gt "$MAX" ]; then
            echo "❌ BLOCKED: $file is $(($SIZE / 1048576))MB — files over 5MB must go to R2 or Sanity, not git"
            exit 1
          fi
        done
      skip:
        - merge
        - rebase
    update-status:
      run: node scripts/update-status.mjs && git add PROJECT-STATUS.md
      skip:
        - merge
        - rebase

pre-commit:
  commands:
    biome:
      glob: "*.{js,ts,jsx,tsx,json,css,astro}"
      run: bunx biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true
